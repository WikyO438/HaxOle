.comment{
background:#1c1c1c;

<h1>Dream Tin gana la final de la Hax League</h1>

<p>

Dream Tin se consagró campeón tras un partido histórico
contra Hax Legends.

El encuentro terminó 3-2 y fue seguido por cientos de
espectadores en la comunidad de Haxball.

</p>

<div class="comments">

<h2>Comentarios</h2>

<textarea id="commentInput"></textarea>

<button onclick="addComment()">Comentar</button>

<div id="commentList"></div>

</div>

</div>

<script>

function addComment(){

let input=document.getElementById("commentInput");

let comment=input.value;

if(comment==="") return;

let div=document.createElement("div");

div.className="comment";

div.innerText=comment;

document.getElementById("commentList").appendChild(div);

input.value="";

}

</script>

</body>
